site_name: FormalCalc
site_description: Verifiable, step-by-step formal manipulation in Mathematica
docs_dir: docs

theme:
  name: material
  icon:
    logo: material/function-variant
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Concepts:
      - Notation & workflow: concepts/notation.md
      - The derivation chain: concepts/derivations.md
      - Performing & verifying: concepts/performing-and-verifying.md
      - How verification works: concepts/verification.md
      - Core vs domain packs: concepts/domain-packs.md
  - Reference:
      - Core: reference/core.md
      - Addressing subexpressions: reference/subexpressions.md
      - General algebra: reference/algebra.md
      - Series & asymptotics: reference/series.md
      - Matrix & non-commutative: reference/matrix.md
      - Integrals: reference/integrals.md
      - Sums: reference/sums.md
      - Bounds: reference/bounds.md
      - Inequalities: reference/inequalities.md
      - Two-sided (in)equations: reference/twosided.md
      - Gaussian pack (domain): reference/gaussian.md
  - Examples: examples.md
